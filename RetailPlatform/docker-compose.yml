services:

  retailplatform.api:
    image: ${DOCKER_REGISTRY-}retailplatformapi
    ports:
      - "50000:8080"
      - "50001:8081"
    build:
      context: .
      dockerfile: RetailSolution.API/Dockerfile
    environment:
      - ConnectionStrings__Redis=redis:6379
      - Keycloak__Authority=http://keycloak:8080/realms/retailplatform
      - Keycloak__Audience=retailplatform-api
      - Keycloak__MetadataAddress=http://keycloak:8080/realms/retailplatform/.well-known/openid-configuration
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - retailplatform-network

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - retailplatform-network

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - retailplatform-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - retailplatform-network

volumes:
  redis-data:
  keycloak-db-data:

networks:
  retailplatform-network:
    driver: bridge
